<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test Animación Botón Gemini</title>
<style>
body { 
    font-family: Inter, sans-serif; 
    background: #f1f5f9; 
    display: flex; 
    flex-direction: column;
    align-items: center; 
    justify-content: center; 
    min-height: 100vh; 
    gap: 2rem;
}
h2 { color: #333; }

/* Copia exacta de components.css + animations.css */
@keyframes geminiGradient {
    0%   { background-position: 0% 50%; }
    25%  { background-position: 50% 0%; }
    50%  { background-position: 100% 50%; }
    75%  { background-position: 50% 100%; }
    100% { background-position: 0% 50%; }
}
@keyframes geminiBorder {
    0%   { background-position: 0% 50%; }
    25%  { background-position: 100% 0%; }
    50%  { background-position: 100% 100%; }
    75%  { background-position: 0% 100%; }
    100% { background-position: 0% 50%; }
}
@keyframes geminiSparkle {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
    25%      { transform: scale(1.2) rotate(10deg); opacity: 0.9; }
    50%      { transform: scale(1.1) rotate(-5deg); opacity: 0.8; }
    75%      { transform: scale(1.25) rotate(15deg); opacity: 0.85; }
}

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.7rem 1rem;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
}
.btn-full { width: 100%; max-width: 400px; }

.btn-transcribe-structure {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.3rem;
    font-weight: 700;
    font-size: 0.88rem;
    border: none;
    color: #fff;
    position: relative;
    z-index: 1;
    background: linear-gradient(135deg, #4285f4, #9b72cb, #d96570, #f4b400, #9b72cb, #4285f4);
    background-size: 400% 400%;
    animation: geminiGradient 3s ease infinite;
    box-shadow: 0 2px 12px rgba(66,133,244,0.3), 0 0 24px rgba(155,114,203,0.2);
    transition: box-shadow 0.3s, transform 0.15s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    border: 2px solid rgba(255,255,255,0.15);
}
.btn-transcribe-structure::before {
    content: '';
    position: absolute;
    inset: -3px;
    z-index: -1;
    border-radius: inherit;
    background: linear-gradient(135deg, #4285f4, #9b72cb, #d96570, #f4b400, #0f9d58, #4285f4);
    background-size: 400% 400%;
    animation: geminiBorder 3s ease infinite;
    opacity: 0.7;
    filter: blur(8px);
}
.btn-transcribe-structure:hover:not(:disabled) {
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 6px 28px rgba(66,133,244,0.4), 0 0 40px rgba(155,114,203,0.3), 0 0 15px rgba(217,101,112,0.25);
}
.btn-transcribe-structure .sparkle-icon {
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.8));
    animation: geminiSparkle 2s ease-in-out infinite;
}
.pro-badge-sm {
    display: inline-block;
    font-size: 0.62rem;
    background: rgba(255,255,255,0.25);
    color: #fff;
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 0.25rem;
    font-weight: 700;
}

.btn-transcribe-structure:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    animation: none;
    background: linear-gradient(135deg, #9ca3af, #6b7280);
    background-size: 100% 100%;
    box-shadow: none;
    border-color: transparent;
}
.btn-transcribe-structure:disabled::before { display: none; }

.label { color: #666; font-size: 0.9rem; margin-bottom: -1rem; }
</style>
</head>
<body>

<h2>Test: Animación Botón Gemini</h2>

<p class="label">HABILITADO (así se ve con archivos cargados):</p>
<button class="btn btn-full btn-transcribe-structure">
    <svg class="sparkle-icon" width="16" height="16" viewBox="0 0 24 24" fill="white" style="margin-right:0.3rem;">
        <path d="M12 2C12 2 13.5 8 20 12C13.5 16 12 22 12 22C12 22 10.5 16 4 12C10.5 8 12 2 12 2Z"/>
    </svg>
    Transcribir y Estructurar
    <span class="pro-badge-sm">Pro</span>
</button>

<p class="label">DESHABILITADO (así se ve sin archivos):</p>
<button class="btn btn-full btn-transcribe-structure" disabled>
    <svg class="sparkle-icon" width="16" height="16" viewBox="0 0 24 24" fill="white" style="margin-right:0.3rem;">
        <path d="M12 2C12 2 13.5 8 20 12C13.5 16 12 22 12 22C12 22 10.5 16 4 12C10.5 8 12 2 12 2Z"/>
    </svg>
    Transcribir y Estructurar
    <span class="pro-badge-sm">Pro</span>
</button>

<p style="color: #999; font-size: 0.8rem; margin-top: 2rem;">
    Si ves el botón de arriba con colores azul/púrpura/rosa moviéndose y un resplandor → el CSS funciona.<br>
    Si se ve gris o estático → hay un problema de navegador o de carga CSS.
</p>

</body>
</html>
