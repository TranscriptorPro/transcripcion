<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard - Transcriptor Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #64748b;
        }

        .stat-card p {
            margin: 10px 0 0;
            font-size: 1.5rem;
            font-weight: 800;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #f1f5f9;
            font-weight: 600;
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-active {
            background: #dcfce7;
            color: #166534;
        }

        .status-expired {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        #configSection {
            margin-top: 40px;
            padding: 20px;
            background: #e2e8f0;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🚀 Dashboard Maestro</h1>
        <button class="btn btn-primary" onclick="loadData()">Actualizar Datos</button>
    </div>

    <div class="stats">
        <div class="stat-card">
            <h3>Médicos Activos</h3>
            <p id="totalActive">0</p>
        </div>
        <div class="stat-card">
            <h3>Reportes Totales</h3>
            <p id="totalUsage">0</p>
        </div>
        <div class="stat-card">
            <h3>Ingresos Proyectados</h3>
            <p id="revenue">$0</p>
        </div>
    </div>

    <table id="doctorsTable">
        <thead>
            <tr>
                <th>Médico</th>
                <th>Matrícula</th>
                <th>Estado</th>
                <th>Plan</th>
                <th>Vencimiento</th>
                <th>Puestos</th>
                <th>Uso</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <!-- Se carga dinámicamente -->
        </tbody>
    </table>

    <div id="configSection">
        <h3>Configuración de Google Sheets</h3>
        <input type="text" id="sheetsUrl" placeholder="Pegar URL de Apps Script aquí"
            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1;">
        <p style="font-size: 0.8rem; color: #64748b;">Este dashboard se conecta directamente a tu Google Sheet para
            gestionar los permisos en tiempo real.</p>
    </div>

    <script>
        // Esta URL es la que genera el Google Apps Script al implementarlo
        let API_URL = localStorage.getItem('master_sheets_url') || '';
        if (API_URL) document.getElementById('sheetsUrl').value = API_URL;

        function loadData() {
            const url = document.getElementById('sheetsUrl').value;
            if (!url) return alert('Por favor configura la URL del Google Sheet');
            localStorage.setItem('master_sheets_url', url);
            API_URL = url;

            // Simulación de carga (sustituir por fetch real de Google Sheets)
            const mockData = [
                { id: '1', nombre: 'Dr. Juan Perez', matricula: '12345', estado: 'Activo', plan: 'Pro', vencimiento: '2026-03-20', devices: 2, usage: 145 },
                { id: '2', nombre: 'Dra. Maria Garcia', matricula: '67890', estado: 'Inactivo', plan: 'Normal', vencimiento: '2026-01-15', devices: 1, usage: 12 }
            ];

            updateTable(mockData);
        }

        function updateTable(data) {
            const tbody = document.querySelector('#doctorsTable tbody');
            tbody.innerHTML = '';
            let totalUsage = 0;
            let active = 0;

            data.forEach(dr => {
                totalUsage += dr.usage;
                if (dr.estado === 'Activo') active++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${dr.nombre}</td>
                    <td>${dr.matricula}</td>
                    <td><span class="status-pill ${dr.estado === 'Activo' ? 'status-active' : 'status-expired'}">${dr.estado}</span></td>
                    <td>${dr.plan}</td>
                    <td>${dr.vencimiento}</td>
                    <td>${dr.devices}</td>
                    <td>${dr.usage}</td>
                    <td><button class="btn btn-primary" onclick="alert('Editar Dr. ${dr.nombre}')">Gestionar</button></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalActive').innerText = active;
            document.getElementById('totalUsage').innerText = totalUsage;
            document.getElementById('revenue').innerText = `$${active * 5000}`; // Ejemplo
        }

        window.onload = () => { if (API_URL) loadData(); };
    </script>
</body>

</html>
