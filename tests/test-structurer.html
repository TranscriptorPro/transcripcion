<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🧪 Test Estructuración IA — Transcriptor Pro</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  header { background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  header small { color: #94a3b8; font-size: 0.8rem; }
  .api-bar { background: #1e293b; padding: 0.75rem 2rem; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  .api-bar label { font-size: 0.85rem; color: #94a3b8; white-space: nowrap; }
  .api-bar input { flex: 1; min-width: 320px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; padding: 0.45rem 0.75rem; color: #e2e8f0; font-size: 0.85rem; font-family: monospace; }
  .api-bar button { background: #3b82f6; color: white; border: none; border-radius: 6px; padding: 0.45rem 1.25rem; cursor: pointer; font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
  .api-bar button:hover { background: #2563eb; }
  .api-bar button:disabled { background: #475569; cursor: not-allowed; }
  #runAll { background: #10b981; }
  #runAll:hover { background: #059669; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #475569; flex-shrink: 0; }
  .status-dot.ok { background: #10b981; }
  .status-dot.err { background: #ef4444; }

  main { padding: 1.5rem 2rem; display: grid; gap: 1.5rem; }

  .test-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; overflow: hidden; }
  .test-card-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1rem; background: #263548; border-bottom: 1px solid #334155; cursor: pointer; user-select: none; }
  .test-card-header .badge { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: #334155; color: #94a3b8; }
  .test-card-header .badge.running { background: #1d4ed8; color: #bfdbfe; }
  .test-card-header .badge.ok { background: #065f46; color: #6ee7b7; }
  .test-card-header .badge.err { background: #7f1d1d; color: #fca5a5; }
  .test-card-header h2 { font-size: 0.95rem; font-weight: 600; flex: 1; }
  .test-card-header .timer { font-size: 0.75rem; color: #64748b; }
  .test-card-body { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #334155; }
  .test-card-body.collapsed { display: none; }
  .pane { background: #1e293b; padding: 1rem; }
  .pane-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: 0.5rem; }
  .raw-text { font-size: 0.8rem; color: #94a3b8; white-space: pre-wrap; line-height: 1.6; font-style: italic; }
  .result-html { font-size: 0.85rem; line-height: 1.7; }
  .result-html h1 { font-size: 1rem; font-weight: 700; color: #e2e8f0; margin: 0.5rem 0 0.25rem; border-bottom: 1px solid #334155; padding-bottom: 0.25rem; }
  .result-html h2 { font-size: 0.9rem; font-weight: 700; color: #7dd3fc; margin: 0.6rem 0 0.15rem; }
  .result-html h3 { font-size: 0.85rem; font-weight: 600; color: #93c5fd; margin: 0.3rem 0; }
  .result-html p { margin-bottom: 0.4rem; }
  .result-html .sp { color: #64748b; font-style: italic; font-size: 0.8rem; }
  .result-html .conclusion-section { background: rgba(16,185,129,0.08); border-left: 3px solid #10b981; padding: 0.5rem 0.75rem; border-radius: 4px; margin-top: 0.5rem; }
  .result-html ul { padding-left: 1.25rem; margin-bottom: 0.4rem; }
  .no-data-field { background: rgba(251,191,36,0.15); border: 1px dashed #f59e0b; border-radius: 4px; padding: 0 4px; font-size: 0.8rem; color: #fbbf24; }
  .placeholder { color: #475569; font-style: italic; font-size: 0.85rem; padding: 2rem 1rem; text-align: center; }
  .error-msg { color: #f87171; font-size: 0.8rem; padding: 0.5rem; background: rgba(239,68,68,0.1); border-radius: 4px; }
  .sp-stat { display: flex; gap: 1rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #334155; font-size: 0.75rem; color: #64748b; }
  .sp-stat span { color: #10b981; font-weight: 700; }
</style>
</head>
<body>

<header>
  <div>🧪</div>
  <div>
    <h1>Test Estructuración IA</h1>
    <small>Simula el paso de texto crudo → LLaMA 3.3-70b → informe estructurado · Sin transcripción de audio</small>
  </div>
</header>

<div class="api-bar">
  <div class="status-dot" id="apiDot"></div>
  <label>🔑 API Key Groq</label>
  <input type="password" id="apiKeyInput" placeholder="gsk_...  (se usa solo en esta página, no se guarda)">
  <button id="runAll">▶ Ejecutar todos los tests</button>
  <button id="runSelected" style="background:#6366f1">▶ Ejecutar seleccionado</button>
</div>

<main id="main"></main>

<!-- Stubs necesarios para que structurer.js cargue sin el DOM real -->
<script>
  window.showToast = (msg) => console.log('[toast]', msg);
  window.extractPatientDataFromText = () => ({});
  window.GROQ_API_KEY = '';
  window.MEDICAL_TEMPLATES = {}; // será sobreescrito por templates.js
  window.CLIENT_CONFIG = { type: 'ADMIN' };
</script>
<script src="../src/js/config/templatesCatalog.js"></script>
<script src="../src/js/config/templates.js"></script>
<script src="../src/js/features/structurer.js"></script>

<script>
// ─── CASOS DE PRUEBA ───────────────────────────────────────────────────────
// Textos intencionalmente crudos: sin puntuación perfecta, con errores típicos
// de dictado por voz (Whisper a veces une palabras, omite tildes, repite).

const TESTS = [
  {
    id: 'eco',
    label: '🫀 Ecografía Abdominal',
    templateKey: 'ecografia_abdominal',
    raw: `paciente de cuarenta y dos años de sexo femenino se realiza ecografía abdominal completa
hígado de tamaño conservado ecotextura homogénea sin lesiones ocupantes de espacio sin dilatación de vías biliares intrahepáticas
vesícula biliar con múltiples imágenes hiperecogénicas con sombra acústica posterior compatibles con litiasis vesicular la mayor de aproximadamente doce milímetros no se observan signos de colecistitis aguda
vías biliares el colédoco se visualiza en su porción proximal de calibre normal cuatro milímetros
páncreas de visualización parcial por interposición gaseosa la cabeza pancreática de aspecto conservado el resto no valorable
bazo de tamaño y ecoestructura normales sin lesiones focales
riñón derecho tamaño y morfología conservados sin dilatación pielocalicial ni imágenes litiásicas
riñón izquierdo ídem
vejiga repleta de contenido anecoico homogéneo sin lesiones endoluminales
no se observa líquido libre en cavidad abdominal`
  },
  {
    id: 'gastro',
    label: '🔬 Gastroscopía',
    templateKey: 'gastroscopia',
    raw: `se realiza endoscopía digestiva alta bajo sedación con midazolam y fentanilo con buena tolerancia
esófago con mucosa de aspecto normal calibre conservado sin lesiones en el tercio distal se observa mucosa de Barrett de corta extensión de aproximadamente dos centímetros se toman biopsias en cuatro cuadrantes
unión gastroesofágica con hiato amplio compatible con hernia hiatal por deslizamiento pequeña
fondo gástrico sin particularidades
cuerpo gástrico mucosa con pliegues de aspecto normal sin lesiones
antro gástrico con mucosa eritematosa difusa compatible con gastritis antral se realiza test de ureasa que resulta positivo
píloro sin alteraciones
duodeno primera porción sin lesiones
bulbo duodenal aspecto normal segunda porción no valorada por limitaciones técnicas`
  },
  {
    id: 'colono',
    label: '🔬 Colonoscopía',
    templateKey: 'colonoscopia',
    raw: `colonoscopía con preparación adecuada escala de Boston siete puntos bajo sedación con propofol
recto sin lesiones mucosa de aspecto normal
colon sigmoideo se identifican dos pólipos sésiles de cinco y siete milímetros respectivamente se realizan polipectomías con asa fría con resección completa macroscópica y se envían a anatomía patológica
colon descendente sin alteraciones
ángulo esplénico con mucosa normal
colon transverso sin lesiones
ángulo hepático normal
colon ascendente sin alteraciones
ciego intubado con visualización de válvula ileocecal de aspecto normal
íleon terminal intubado diez centímetros sin lesiones
no se identifican otras lesiones`
  },
  {
    id: 'cinecoro',
    label: '❤️ Cinecoronariografía',
    templateKey: 'cinecoro',
    raw: `acceso por vía radial derecha con catéter judkins cinco french sin complicaciones
ventriculografía izquierda con función ventricular conservada fracción de eyección estimada en sesenta y cinco por ciento motilidad segmentaria normal sin trastornos de la contractilidad regional presiones normales
tronco coronario izquierdo sin lesiones angiográficamente significativas
descendente anterior con lesión severa en segmento proximal con estenosis del setenta y cinco por ciento de tipo excéntrica de dieciocho milímetros de longitud con flujo TIMI tres la primera diagonal sin lesiones
circunfleja dominante derecha sin lesiones angiográficas significativas primera obtusa marginal sin lesiones
coronaria derecha no dominante con lesión del cuarenta por ciento en segmento medio sin compromiso hemodinámico significativo sin estenosis en tercio distal sin vasos venosos visibles`
  },
];

// ─── RENDER INICIAL ────────────────────────────────────────────────────────
const main = document.getElementById('main');

TESTS.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 'test-card';
  card.id = 'card-' + t.id;
  card.innerHTML = `
    <div class="test-card-header" onclick="toggleCard('${t.id}')">
      <h2>${t.label}</h2>
      <span class="badge" id="badge-${t.id}">pendiente</span>
      <span class="timer" id="timer-${t.id}"></span>
      <button onclick="event.stopPropagation(); runOne('${t.id}')" 
        style="background:#6366f1;color:white;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:0.75rem">
        ▶ Solo este
      </button>
    </div>
    <div class="test-card-body collapsed" id="body-${t.id}">
      <div class="pane">
        <div class="pane-title">📝 Texto crudo (simula salida de Whisper)</div>
        <div class="raw-text">${t.raw}</div>
      </div>
      <div class="pane" id="result-${t.id}">
        <div class="pane-title">✨ Informe estructurado</div>
        <div class="placeholder">Ejecutá el test para ver el resultado</div>
      </div>
    </div>`;
  main.appendChild(card);
});

function toggleCard(id) {
  const body = document.getElementById('body-' + id);
  body.classList.toggle('collapsed');
}

// ─── LÓGICA DE EJECUCIÓN ───────────────────────────────────────────────────
document.getElementById('apiKeyInput').addEventListener('input', e => {
  const k = e.target.value.trim();
  window.GROQ_API_KEY = k;
  document.getElementById('apiDot').className = 'status-dot ' + (k.startsWith('gsk_') ? 'ok' : 'err');
});

async function runOne(id) {
  const test = TESTS.find(t => t.id === id);
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('gsk_')) {
    alert('Ingresá una API Key válida (debe empezar con gsk_)');
    return;
  }
  window.GROQ_API_KEY = key;

  const badge  = document.getElementById('badge-' + id);
  const timer  = document.getElementById('timer-' + id);
  const result = document.getElementById('result-' + id);
  const body   = document.getElementById('body-' + id);

  // Expandir la tarjeta
  body.classList.remove('collapsed');

  badge.className = 'badge running';
  badge.textContent = '⏳ ejecutando...';
  timer.textContent = '';
  result.innerHTML = '<div class="pane-title">✨ Informe estructurado</div><div class="placeholder">Llamando a LLaMA 3.3-70b...</div>';

  const t0 = Date.now();
  try {
    const raw = await structureTranscription(test.raw, test.templateKey);
    const elapsed = ((Date.now() - t0) / 1000).toFixed(1);

    // Contar secciones con s/p y secciones con contenido real
    const spCount      = (raw.match(/^s\/p\s*$/gim) || []).length;
    const headingCount = (raw.match(/^##\s/gm) || []).length;

    // Render HTML usando el markdownToHtml real de la app
    const html = markdownToHtml(raw);
    // Resaltar visualmente las secciones con solo s/p
    const htmlHighlit = html
      .replace(/<p class="report-p">s\/p<\/p>/gi,
        '<p class="report-p sp">s/p</p>')
      .replace(/(<h2 class="report-h2">CONCLUSI[^<]*<\/h2>)/i,
        '<div class="conclusion-section">$1');

    result.innerHTML = `
      <div class="pane-title">✨ Informe estructurado</div>
      <div class="result-html">${htmlHighlit}</div>
      <div class="sp-stat">
        Secciones totales: <span>${headingCount}</span> &nbsp;|&nbsp;
        Secciones s/p: <span>${spCount}</span> &nbsp;|&nbsp;
        Con hallazgos: <span>${headingCount - spCount - 1}</span> &nbsp;|&nbsp;
        Tiempo: <span>${elapsed}s</span>
      </div>`;

    badge.className = 'badge ok';
    badge.textContent = '✅ OK';
    timer.textContent = elapsed + 's';
  } catch(e) {
    badge.className = 'badge err';
    badge.textContent = '❌ Error';
    result.innerHTML = `<div class="pane-title">✨ Informe estructurado</div><div class="error-msg">${e.message}</div>`;
  }
}

document.getElementById('runAll').addEventListener('click', async () => {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('gsk_')) { alert('Ingresá una API Key válida'); return; }
  const btn = document.getElementById('runAll');
  btn.disabled = true;
  btn.textContent = '⏳ Ejecutando...';
  // Secuencial para no saturar la API
  for (const t of TESTS) await runOne(t.id);
  btn.disabled = false;
  btn.textContent = '▶ Ejecutar todos los tests';
});

document.getElementById('runSelected').addEventListener('click', () => {
  // Ejecuta solo el primero expandido
  const expanded = TESTS.find(t => !document.getElementById('body-'+t.id).classList.contains('collapsed'));
  if (expanded) runOne(expanded.id);
  else alert('Expandí una tarjeta primero haciendo clic en su encabezado');
});
</script>
</body>
</html>
