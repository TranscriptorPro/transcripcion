<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {

.btn-run {
    flex: 1; min-width: 200px; padding: 12px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
}
.btn-run:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,0.4); }
.btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-individual {
    padding: 10px 16px; border: 1px solid #475569; border-radius: 8px;

.btn-individual:hover { background: #253347; border-color: #3b82f6; }
.btn-individual:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-individual.running { border-color: #f59e0b; color: #fcd34d; }
.btn-individual.pass { border-color: #059669; color: #6ee7b7; }
.btn-individual.fail { border-color: #dc2626; color: #fca5a5; }

/* Progress */
.progress-bar { 
    max-width: 700px; margin: 16px auto; height: 5px; 
    background: #1e293b; border-radius: 3px; overflow: hidden; display: none;
}
.progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); width: 0%; transition: width 0.3s; }
.status-text { text-align: center; color: #94a3b8; margin-bottom: 12px; font-size: 0.82rem; }

/* Summary */
.summary {
    max-width: 700px; margin: 0 auto 20px; display: none;
    padding: 14px 18px; border-radius: 10px; font-size: 1rem; font-weight: 600;
    text-align: center;
}
.summary.pass { background: #064e3b; border: 1px solid #059669; color: #6ee7b7; }
.summary.fail { background: #450a0a; border: 1px solid #dc2626; color: #fca5a5; }
.summary.mixed { background: #451a03; border: 1px solid #d97706; color: #fcd34d; }

/* Results */
.results { max-width: 900px; margin: 0 auto; }
.section-block { 
    margin-bottom: 14px; background: #1e293b; border-radius: 10px; 
    border: 1px solid #334155; overflow: hidden;
}
.section-header {
    padding: 10px 14px; background: #253347; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    user-select: none;
}
.section-header:hover { background: #2d3f56; }
.section-title { font-weight: 600; font-size: 0.9rem; }
.section-badge {
    font-size: 0.72rem; padding: 2px 8px; border-radius: 16px; font-weight: 700;

.section-badge.all-pass { background: #065f46; color: #6ee7b7; }
.section-badge.has-fail { background: #7f1d1d; color: #fca5a5; }

.section-body { display: none; padding: 8px 14px 10px; }
.section-block.open .section-body { display: block; }
.test-row {
    padding: 5px 0; display: flex; align-items: flex-start; gap: 6px;
    border-bottom: 1px solid #1e293b; font-size: 0.82rem;

.test-row:last-child { border-bottom: none; }
.test-icon { flex-shrink: 0; font-size: 0.95rem; line-height: 1.3; }
.test-label { color: #cbd5e1; flex: 1; }
.test-detail { color: #f87171; font-size: 0.78rem; padding-left: 24px; margin-top: 2px; word-break: break-all; }
.test-output {

/* Timing */

/* Iframe */
#appFrame { 
    position: fixed; top: -9999px; left: -9999px; 
    width: 1280px; height: 900px; border: none;
}

//  TEST SECTIONS
// ═══════════════════════════════════════════════════

const ALL_TESTS = [];
function section(name, tests) { ALL_TESTS.push({ name, tests }); }

// Helper para acceso al iframe
function $(id) { return appFrame.contentDocument?.getElementById(id); }
function $$(sel) { return appFrame.contentDocument?.querySelectorAll(sel) || []; }
function win() { return appFrame.contentWindow; }
function doc() { return appFrame.contentDocument; }

// ── SECCIÓN 1: Detección de plantillas (sin API) ──────────────────────────────
section('1. Detección de plantillas (autoDetectTemplateKey)', (() => {
    const tests = [];
    for (const [key, data] of Object.entries(RAW_TEXTS)) {
        tests.push({
            name: `Detecta "${data.label}" (${key})`,
            test: () => {
                const fn = win().autoDetectTemplateKey;
                if (!fn) throw 'autoDetectTemplateKey no disponible';
                const detected = fn(data.text);
                if (detected !== key) throw `Esperado "${key}", detectó "${detected}"`;
                return true;
            }
        });
    }
    return tests;
})());

// ── SECCIÓN 2: markdownToHtml (sin API) ──────────────────────────────────────
section('2. markdownToHtml — renderizado de markdown a HTML', [
    {
        name: 'H1 + H2 + párrafo se renderizan',
        test: () => {
            const fn = win().markdownToHtml;
            if (!fn) throw 'markdownToHtml no disponible';
            const html = fn('# INFORME\n\n## HALLAZGOS\n\nParénquima normal.');
            if (!html.includes('<h1')) throw 'Falta H1';
            if (!html.includes('<h2')) throw 'Falta H2';
            if (!html.includes('normal')) throw 'Falta contenido';
            return true;
        }
    },
    {
        name: 'Lista con bullets',
        test: () => {
            const html = win().markdownToHtml('## LISTA\n\n- Item 1\n- Item 2\n- Item 3');
            if (!html.includes('<ul')) throw 'Falta UL';
            if (!html.includes('<li>')) throw 'Falta LI';
            return true;
        }
    },
    {

section('3. Estructuración con API (Groq LLaMA)', (() => {
    const tests = [];
    // Elegir un subset representativo para no gastar demasiados tokens
    const SUBSET = ['ecografia_abdominal', 'colonoscopia', 'holter', 'ett', 'laringoscopia', 'epicrisis'];
    
    for (const key of SUBSET) {
        const data = RAW_TEXTS[key];
        tests.push({
            name: `Estructurar "${data.label}" → resultado válido`,
            test: async () => {
                const structFn = win().structureTranscription;
                if (!structFn) throw 'structureTranscription no disponible';
                const apiKey = document.getElementById('apiKeyInput').value.trim();
                win().GROQ_API_KEY = apiKey;
                
                const t0 = performance.now();
                const rawMd = await structFn(data.text, key, 0.1);
                const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
                
                if (!rawMd || rawMd.length < 100) throw `Respuesta muy corta: ${rawMd?.length || 0} chars (${elapsed}s)`;
                if (!rawMd.includes('#')) throw `Sin encabezados markdown (${elapsed}s)`;
                
                // Verificar que no perdió datos clave del texto original
                const checkWords = {
                    ecografia_abdominal: ['hígado', 'vesícula', 'riñón'],
                    colonoscopia: ['recto', 'sigmoide', 'pólipo'],
                    holter: ['frecuencia', 'extrasístoles', 'ventricular'],
                    ett: ['ventrículo', 'FEVI', 'válvula'],
                    laringoscopia: ['cuerdas vocales', 'epiglotis', 'fonación'],
                    epicrisis: ['internación', 'diagnóstico', 'alta']
                };
                
                const words = checkWords[key] || [];
                const lower = rawMd.toLowerCase();
                const missing = words.filter(w => !lower.includes(w.toLowerCase()));
                if (missing.length > 0) throw `Faltan datos clave: ${missing.join(', ')} (${elapsed}s)`;
                
                // Guardar resultado para tests posteriores
                window._structuredResults = window._structuredResults || {};
                window._structuredResults[key] = rawMd;
                
                return { detail: `✓ ${rawMd.length} chars, ${elapsed}s`, pass: true };
            }
        });
    }
    return tests;
})());

const appFrame = document.getElementById('appFrame');
let appLoaded = false;

async function ensureAppLoaded() {
    if (appLoaded) return;
    
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    if (!apiKey || !apiKey.startsWith('gsk_')) {
        alert('Ingresá una API key válida (empieza con gsk_)');
        throw new Error('API key inválida');
    }
    
    document.getElementById('statusText').textContent = '⏳ Cargando app...';
    
    // Cargar app en iframe — simple y directo
    await new Promise((resolve) => {
        appFrame.onload = () => setTimeout(resolve, 3000);
        appFrame.src = '../index.html?nocache=' + Date.now();
    });
    
    // Inyectar API key
    try {
        win().GROQ_API_KEY = apiKey;
        win().localStorage.setItem('groq_api_key', apiKey);
    } catch(e) {}
    
    appLoaded = true;
    document.getElementById('statusText').textContent = '✅ App cargada';
}

async function runSection(sectionIndex, btnEl) {
    try {
        await ensureAppLoaded();
    } catch(e) { return; }
    
    if (btnEl) { btnEl.className = 'btn-individual running'; btnEl.disabled = true; }
    
    const sec = ALL_TESTS[sectionIndex];
    const sRes = { name: sec.name, tests: [] };
    let passed = 0, failed = 0;
    
    for (const t of sec.tests) {
        document.getElementById('statusText').textContent = `${sec.name}: ${t.name}`;
        try {
            const result = t.test();
            let detail = '';
            if (result && typeof result.then === 'function') {
                const resolved = await result;
                if (resolved && resolved.detail) detail = resolved.detail;
            } else if (result && result.detail) {
                detail = result.detail;
            }
            sRes.tests.push({ name: t.name, pass: true, detail });
            passed++;
        } catch(err) {
            sRes.tests.push({ name: t.name, pass: false, error: String(err) });
            failed++;
        }
        await new Promise(r => setTimeout(r, 30));
    }
    
    // Render result
    renderSectionResult(sRes);
    
    if (btnEl) {
        btnEl.className = `btn-individual ${failed > 0 ? 'fail' : 'pass'}`;
        btnEl.disabled = false;
    }
    
    document.getElementById('statusText').textContent = 
        `${sec.name}: ✅ ${passed} · ❌ ${failed}`;
    
    return { passed, failed };
}

async function runAllTests() {
    const btnRun = document.getElementById('btnRunAll');
    btnRun.disabled = true;
    btnRun.textContent = '⏳ Preparando...';
    
    try {
        await ensureAppLoaded();
    } catch(e) { 
        btnRun.disabled = false;
        btnRun.textContent = '▶ Ejecutar TODAS las pruebas';
        return; 
    }
    
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const summaryDiv = document.getElementById('summary');
    const resultsDiv = document.getElementById('results');
    
    progressBar.style.display = 'block';
    summaryDiv.style.display = 'none';
    resultsDiv.innerHTML = '';
    
    let totalPassed = 0, totalFailed = 0;
    const totalTests = ALL_TESTS.reduce((a, s) => a + s.tests.length, 0);
    let tested = 0;
    
    const indBtns = document.querySelectorAll('.btn-individual');
    
    for (let i = 0; i < ALL_TESTS.length; i++) {
        indBtns[i].className = 'btn-individual running';
        
        const sec = ALL_TESTS[i];
        const sRes = { name: sec.name, tests: [] };
        
        for (const t of sec.tests) {
            tested++;
            document.getElementById('statusText').textContent = `${tested}/${totalTests}: ${t.name}`;
            progressFill.style.width = `${(tested / totalTests) * 100}%`;
            
            try {
                const result = t.test();
                let detail = '';
                if (result && typeof result.then === 'function') {
                    const resolved = await result;
                    if (resolved && resolved.detail) detail = resolved.detail;
                } else if (result && result.detail) {
                    detail = result.detail;
                }
                sRes.tests.push({ name: t.name, pass: true, detail });
                totalPassed++;
            } catch(err) {
                sRes.tests.push({ name: t.name, pass: false, error: String(err) });
                totalFailed++;
            }
            await new Promise(r => setTimeout(r, 30));
        }
        
        const secFailed = sRes.tests.filter(t => !t.pass).length;
        indBtns[i].className = `btn-individual ${secFailed > 0 ? 'fail' : 'pass'}`;
        renderSectionResult(sRes);
    }
    
    // Summary
    progressFill.style.width = '100%';
    document.getElementById('statusText').textContent = 
        `✅ ${totalPassed} pasaron · ❌ ${totalFailed} fallaron · Total: ${totalTests}`;
    
    summaryDiv.style.display = 'block';
    if (totalFailed === 0) {
        summaryDiv.className = 'summary pass';
        summaryDiv.innerHTML = `🎉 ¡TODAS LAS PRUEBAS PASARON! ${totalPassed}/${totalTests}`;
    } else if (totalPassed === 0) {
        summaryDiv.className = 'summary fail';
        summaryDiv.innerHTML = `💥 TODAS FALLARON: ${totalFailed}/${totalTests}`;
    } else {
        summaryDiv.className = 'summary mixed';
        summaryDiv.innerHTML = `⚠️ ${totalPassed} OK · ${totalFailed} FALLARON de ${totalTests}`;
    }
    
    btnRun.disabled = false;
    btnRun.textContent = '🔄 Ejecutar de nuevo';
}

function renderSectionResult(sRes) {
    const resultsDiv = document.getElementById('results');
    
    // Remove existing block for this section if re-running
    const existing = resultsDiv.querySelector(`[data-section="${sRes.name}"]`);
    if (existing) existing.remove();
    
    const allPass = sRes.tests.every(t => t.pass);
    const failCount = sRes.tests.filter(t => !t.pass).length;
    
    const block = document.createElement('div');
    block.className = 'section-block' + (failCount > 0 ? ' open' : '');
    block.setAttribute('data-section', sRes.name);
    
    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
        <span class="section-title">${sRes.name}</span>
        <span class="section-badge ${allPass ? 'all-pass' : 'has-fail'}">
            ${allPass ? `✅ ${sRes.tests.length}/${sRes.tests.length}` : `❌ ${failCount} falla${failCount>1?'s':''}`}
        </span>
    `;
    header.onclick = () => block.classList.toggle('open');
    
    const body = document.createElement('div');
    body.className = 'section-body';
    
    for (const t of sRes.tests) {
        const row = document.createElement('div');
        row.className = 'test-row';
        const detailSpan = t.detail ? `<span class="timing">${t.detail}</span>` : '';
        row.innerHTML = `<span class="test-icon">${t.pass ? '✅' : '❌'}</span><span class="test-label">${t.name}${detailSpan}</span>`;
        body.appendChild(row);
        if (!t.pass && t.error) {
            const detail = document.createElement('div');
            detail.className = 'test-detail';
            detail.textContent = t.error;
            body.appendChild(detail);
        }
    }
    
    block.appendChild(header);
    block.appendChild(body);
    resultsDiv.appendChild(block);
}
</script>
</body>
</html>
