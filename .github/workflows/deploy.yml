# Deploy ofuscado a GitHub Pages
# ──────────────────────────────
# En cada push a main:
#   1. Instala Node + terser
#   2. Ejecuta build.js → genera dist/
#   3. Sube dist/ como artifact de Pages
#   4. GitHub Pages sirve solo el contenido ofuscado

name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite ejecutar manualmente

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Quality gate (quick audit)
        run: npm run audit:quick

      - name: Build (minify + obfuscate)
        run: node build.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-postdeploy:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Smoke validation on deployed URL
        env:
          APP_URL: ${{ needs.deploy.outputs.page_url }}
        run: node tests/smoke-postdeploy-version.js
