name: Audit Quality

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: Audit profile to run
        required: true
        default: quick
        type: choice
        options:
          - quick
          - full
  schedule:
    - cron: '30 3 * * *'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Select profile
        id: profile
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "value=full" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=quick" >> "$GITHUB_OUTPUT"
          fi

      - name: Run audit
        run: node scripts/audit-runner.js --profile=${{ steps.profile.outputs.value }}

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ github.run_id }}-${{ steps.profile.outputs.value }}
          path: reportes/
          if-no-files-found: ignore
